# CPU smoke for the stage-A trainer: synthetic images -> streaming encoder ->
# splat -> official loss -> report with measured iter/s. Run before every push:
#   .venv/bin/python scripts/train_encoder.py --config configs/stage_a_smoke_cpu.yaml --max-steps 2
run_name: stage_a_smoke_cpu
seed: 0

data:
  synthetic: true
  synthetic_kwargs:
    num_items: 3
    num_cams: 2
    image_hw: [64, 128]
    history_frames: 1
    resolution: [16, 16, 8]
    num_classes: 17

model:
  num_gaussians: 40
  num_classes: 17
  feat_dim: 16
  encoder:
    backbone: resnet18
    backbone_weights: null
    embed_dims: 32
    num_blocks: 1
    num_cams: 2
    num_levels: 4
    num_groups: 4
    knn: 8
    scale_range: [0.01, 3.2]
    self_interact: knn
    warmstart: none

grid:
  xyz_min: [-8.0, -8.0, -2.0]
  xyz_max: [8.0, 8.0, 2.0]
  resolution: [16, 16, 8]

loss:
  ce_weight: 10.0
  lovasz_weight: 1.0
  class_weights: null

train:
  micro_batch_per_gpu: 1
  grad_accum: 1
  lr: 1.0e-3
  epochs: 1
  history_grad: false
  num_workers: 0
  log_every: 1
  eval_batches: 2
  timing_warmup_iters: 1
